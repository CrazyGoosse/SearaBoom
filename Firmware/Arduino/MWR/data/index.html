<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta http-equiv="X-UA-Compatible" content="ie=edge" />
        <title>SearaBoom Configuration</title>
        <link rel="stylesheet" href="styles.css" />
    </head>
    <body>
        <article>
            <form action="/" method="POST">
                <h1><b>S</b>eara<b>B</b>oom v1.0</h1>
                <fieldset>
                    <legend>Network</legend>
                    <label for="SSID">SSID</label>
                    <input name="ssid" id="SSID" type="Text" required pattern="[A-Za-z0-9_- ]{0,31}" placeholder="wifi_network_name" title="SSID must be between 1-32 characters using alphanumerics, underscores, dashes and spaces" />
                    <label for="PASS">Password</label> <input name="pass" id="PASS" type="password" />
                </fieldset>
                <button type="submit">Save</button>
            </form>
        </article>
    </body>
</html>
